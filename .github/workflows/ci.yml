name: Integración Continua (CI)

on:
  push:
    branches: [ main ]

jobs:

  # ─── JOB 1: Integración Continua ───────────────────────────────────────────
  build_and_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['18', '20']

    steps:
      - name: 1. Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (v${{ matrix.node-version }})
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: 3. Instalar Dependencias del Proyecto
        run: npm ci

      - name: 4. Ejecutar Pruebas Unitarias con Jest
        run: npm test

  # ─── JOB 2: Despliegue (solo si CI pasó) ───────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build_and_test]

    steps:
      - name: 1. Descargar Código para Despliegue
        uses: actions/checkout@v4

      - name: 2. Despliegue (Simulación)
        run: echo "Despliegue del código verificado a Producción."
        env:
          API_STATUS: OK
          # En un caso real, aquí iría el token de tu servicio en la nube:
          # CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
